# PRODUCTION stack — web + api only. The shared edge Caddy (docker-compose.edge.yml) fronts
# it and routes beecompete.com → this stack's web via its `prod-web` alias on the shared
# `web_edge` network. Managed Postgres is OFF-BOX (Neon) and never in this file. Deployed by
# .github/workflows/deploy-prod.yml on a release tag (R*) — it promotes the EXACT image
# staging already validated (build once, promote), so IMAGE_TAG is pinned to that build.
#
# On the VPS, a sibling `.env` provides prod secrets + config (distinct from staging).
# `web_edge` must already exist on the box (docker network create web_edge).
#
# RESOURCE RULES (4 GB box shared by staging + prod + edge — ops hardening 2026-07-12):
# every service gets a mem_limit so a staging deploy can never OOM-kill prod, the API JVM
# sizes its heap off the CONTAINER limit (MaxRAMPercentage), and every service gets log
# rotation (default json-file driver is unbounded and would fill the disk).
name: beecompete-prod

x-logging: &logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  web:
    image: ghcr.io/${IMAGE_REPO:-hasmika123/beecompete}-web:${IMAGE_TAG:?set IMAGE_TAG to the promoted build}
    restart: unless-stopped
    mem_limit: 512m
    logging: *logging
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:8080
      # Canonical origin for metadata/JSON-LD absolute URLs (runtime, NOT NEXT_PUBLIC_*).
      SITE_URL: https://beecompete.com
      # Node-side (SSR/BFF) Sentry for the WEB project (VPS .env: WEB_SENTRY_DSN; blank =
      # inert). Browser-side uses NEXT_PUBLIC_SENTRY_DSN, baked at image build.
      SENTRY_DSN: ${WEB_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      internal:
      web_edge:
        aliases: [prod-web] # how the shared edge Caddy addresses this container
    healthcheck:
      # 127.0.0.1, NOT localhost: alpine resolves localhost to ::1 first and Node binds
      # IPv4-only, so busybox wget gets connection-refused and the check always fails.
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: ghcr.io/${IMAGE_REPO:-hasmika123/beecompete}-api:${IMAGE_TAG:?set IMAGE_TAG to the promoted build}
    restart: unless-stopped
    mem_limit: 1g
    logging: *logging
    # Structured JSON logs in prod (F8); secrets incl. SENTRY_DSN come from the VPS .env.
    environment:
      SPRING_PROFILES_ACTIVE: json
      # Heap respects the container mem_limit (75% of 1g ≈ 768m), not host RAM.
      JAVA_TOOL_OPTIONS: '-XX:MaxRAMPercentage=75.0'
    env_file: [.env]
    networks: [internal]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  web_edge:
    external: true
  internal:
