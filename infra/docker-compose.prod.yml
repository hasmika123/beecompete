# PRODUCTION stack — web + api only. The shared edge Caddy (docker-compose.edge.yml) fronts
# it and routes beecompete.com → this stack's web via its `prod-web` alias on the shared
# `web_edge` network. Managed Postgres is OFF-BOX (Neon) and never in this file. Deployed by
# .github/workflows/deploy-prod.yml on a release tag (R*) — it promotes the EXACT image
# staging already validated (build once, promote), so IMAGE_TAG is pinned to that build.
#
# On the VPS, a sibling `.env` provides prod secrets + config (distinct from staging).
# `web_edge` must already exist on the box (docker network create web_edge).
name: beecompete-prod

services:
  web:
    image: ghcr.io/${IMAGE_REPO:-hasmika123/beecompete}-web:${IMAGE_TAG:?set IMAGE_TAG to the promoted build}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:8080
    depends_on: [api]
    networks:
      internal:
      web_edge:
        aliases: [prod-web] # how the shared edge Caddy addresses this container

  api:
    image: ghcr.io/${IMAGE_REPO:-hasmika123/beecompete}-api:${IMAGE_TAG:?set IMAGE_TAG to the promoted build}
    restart: unless-stopped
    # Structured JSON logs in prod (F8); secrets incl. SENTRY_DSN come from the VPS .env.
    environment:
      SPRING_PROFILES_ACTIVE: json
    env_file: [.env]
    networks: [internal]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  web_edge:
    external: true
  internal:
