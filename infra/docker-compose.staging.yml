# STAGING stack — web + api only. The shared edge Caddy (docker-compose.edge.yml) fronts it
# and routes staging.beecompete.com → this stack's web via its `staging-web` alias on the
# shared `web_edge` network. Managed Postgres is OFF-BOX (Neon) and never in this file.
# Deployed by .github/workflows/deploy-staging.yml on every push to main.
#
# On the VPS, a sibling `.env` provides secrets + config: IMAGE_TAG, DATABASE_URL, DIRECT_URL,
# SENTRY_DSN, etc. (see beecompete-staging.env). `web_edge` must already exist on the box
# (docker network create web_edge) — the edge stack owns it.
#
# RESOURCE RULES (4 GB box shared by staging + prod + edge — ops hardening 2026-07-12):
# every service gets a mem_limit so a staging deploy can never OOM-kill prod, the API JVM
# sizes its heap off the CONTAINER limit (MaxRAMPercentage), and every service gets log
# rotation (default json-file driver is unbounded and would fill the disk).
name: beecompete-staging

x-logging: &logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  web:
    image: ghcr.io/${IMAGE_REPO:-hasmika123/beecompete}-web:${IMAGE_TAG:-staging}
    restart: unless-stopped
    mem_limit: 384m
    logging: *logging
    environment:
      NODE_ENV: production
      # BFF → API over the internal network (never exposed publicly).
      API_BASE_URL: http://api:8080
      # Admin BFF secret (R1-3): the web server injects this as the X-Admin-Token header on
      # /api/v1/admin/** calls. MUST match the api's ADMIN_API_TOKEN (api reads it via env_file).
      # Without this passthrough the web BFF sends an empty token → every admin write is rejected
      # (fail closed). Blank here = admin off. Same VPS .env value feeds both web and api.
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      # Canonical origin for metadata/JSON-LD absolute URLs — runtime, NOT NEXT_PUBLIC_*:
      # the image is built once and promoted, so build-time inlining can't vary per stack.
      SITE_URL: https://staging.beecompete.com
      # Node-side (SSR/BFF) Sentry for the WEB project — a separate Sentry project from
      # the API's, so its DSN lives in the VPS .env as WEB_SENTRY_DSN (blank = inert).
      # (Browser-side uses NEXT_PUBLIC_SENTRY_DSN, baked at image build — see Dockerfile.)
      SENTRY_DSN: ${WEB_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: staging
      # Privacy-first analytics (R1-14). Leave blank on staging (default) so it stays analytics-free;
      # only set these (to a SEPARATE PostHog project / CF site) if you deliberately want staging data.
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
      CF_WEB_ANALYTICS_TOKEN: ${CF_WEB_ANALYTICS_TOKEN:-}
      # Listing-page email captures via Brevo (R1-15 digest · R1-15b follow + host). Server-only;
      # each is inert unless its list id is set. Use separate staging lists if you enable them,
      # so test signups don't hit the prod lists.
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_DIGEST_LIST_ID: ${BREVO_DIGEST_LIST_ID:-}
      BREVO_FOLLOW_LIST_ID: ${BREVO_FOLLOW_LIST_ID:-}
      BREVO_HOST_LIST_ID: ${BREVO_HOST_LIST_ID:-}
      BREVO_DOI_TEMPLATE_ID: ${BREVO_DOI_TEMPLATE_ID:-}
      BREVO_DOI_REDIRECT_URL: ${BREVO_DOI_REDIRECT_URL:-}
      # In-app feedback (R1-16) → support@ via Brevo transactional mail. Verified sender required.
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      internal:
      web_edge:
        aliases: [staging-web] # how the shared edge Caddy addresses this container
    healthcheck:
      # 127.0.0.1, NOT localhost: alpine resolves localhost to ::1 first and Node binds
      # IPv4-only, so busybox wget gets connection-refused and the check always fails.
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: ghcr.io/${IMAGE_REPO:-hasmika123/beecompete}-api:${IMAGE_TAG:-staging}
    restart: unless-stopped
    mem_limit: 768m
    logging: *logging
    # Secrets (DATABASE_URL pooled, DIRECT_URL for Liquibase, SENTRY_DSN, etc.) come from
    # the VPS .env; the profile switches logging to structured JSON (F8).
    environment:
      SPRING_PROFILES_ACTIVE: json
      # Heap respects the container mem_limit (75% of 768m ≈ 576m), not host RAM —
      # without this the JVM sizes off the 4 GB host and can balloon past the limit.
      JAVA_TOOL_OPTIONS: '-XX:MaxRAMPercentage=75.0'
    env_file: [.env]
    networks: [internal]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  web_edge:
    external: true
  internal:
