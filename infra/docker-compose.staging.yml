# STAGING stack — web + api only. The shared edge Caddy (docker-compose.edge.yml) fronts it
# and routes staging.beecompete.com → this stack's web via its `staging-web` alias on the
# shared `web_edge` network. Managed Postgres is OFF-BOX (Neon) and never in this file.
# Deployed by .github/workflows/deploy-staging.yml on every push to main.
#
# On the VPS, a sibling `.env` provides secrets + config: IMAGE_TAG, DATABASE_URL, DIRECT_URL,
# SENTRY_DSN, etc. (see beecompete-staging.env). `web_edge` must already exist on the box
# (docker network create web_edge) — the edge stack owns it.
#
# RESOURCE RULES (4 GB box shared by staging + prod + edge — ops hardening 2026-07-12):
# every service gets a mem_limit so a staging deploy can never OOM-kill prod, the API JVM
# sizes its heap off the CONTAINER limit (MaxRAMPercentage), and every service gets log
# rotation (default json-file driver is unbounded and would fill the disk).
name: beecompete-staging

x-logging: &logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  web:
    image: ghcr.io/${IMAGE_REPO:-hasmika123/beecompete}-web:${IMAGE_TAG:-staging}
    restart: unless-stopped
    mem_limit: 384m
    logging: *logging
    environment:
      NODE_ENV: production
      # BFF → API over the internal network (never exposed publicly).
      API_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    networks:
      internal:
      web_edge:
        aliases: [staging-web] # how the shared edge Caddy addresses this container
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: ghcr.io/${IMAGE_REPO:-hasmika123/beecompete}-api:${IMAGE_TAG:-staging}
    restart: unless-stopped
    mem_limit: 768m
    logging: *logging
    # Secrets (DATABASE_URL pooled, DIRECT_URL for Liquibase, SENTRY_DSN, etc.) come from
    # the VPS .env; the profile switches logging to structured JSON (F8).
    environment:
      SPRING_PROFILES_ACTIVE: json
      # Heap respects the container mem_limit (75% of 768m ≈ 576m), not host RAM —
      # without this the JVM sizes off the 4 GB host and can balloon past the limit.
      JAVA_TOOL_OPTIONS: '-XX:MaxRAMPercentage=75.0'
    env_file: [.env]
    networks: [internal]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  web_edge:
    external: true
  internal:
