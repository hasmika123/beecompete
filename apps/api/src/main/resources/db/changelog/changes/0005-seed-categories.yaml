# R1-2 — seed the launch taxonomy (domain-model Q1: the ~10 top K-12 categories + "Other")
# and one Category Template per category. Taxonomy is SEED CONFIG, not schema — later
# additions/edits go through the admin tool (R1-3); this changeset only establishes launch state.
#
# Fixed UUIDs (beec0000-…) so templates/seeds/tests can reference categories deterministically.
# Template JSON Schemas start PERMISSIVE (additionalProperties: true) with the standard
# attributes-bag keys (domain-model §3a note) + a few category-specific fields; they tighten
# over time as the S3 extraction pipeline learns real-world shapes — updating a template is an
# admin edit, not a migration.
databaseChangeLog:
  - changeSet:
      id: 0005-seed-categories
      author: beecompete
      comment: R1-2 — the 11 launch categories (Q1 list, locked) with fixed UUIDs.
      changes:
        - sql:
            sql: >-
              INSERT INTO category (id, name, slug) VALUES
              ('beec0000-0000-4000-8000-000000000001', 'Math', 'math'),
              ('beec0000-0000-4000-8000-000000000002', 'Science & Engineering', 'science-engineering'),
              ('beec0000-0000-4000-8000-000000000003', 'Computer Science & Coding', 'computer-science'),
              ('beec0000-0000-4000-8000-000000000004', 'Robotics', 'robotics'),
              ('beec0000-0000-4000-8000-000000000005', 'Debate & Speech', 'debate-speech'),
              ('beec0000-0000-4000-8000-000000000006', 'Business & Entrepreneurship', 'business-entrepreneurship'),
              ('beec0000-0000-4000-8000-000000000007', 'Writing & Essay', 'writing-essay'),
              ('beec0000-0000-4000-8000-000000000008', 'Arts & Music', 'arts-music'),
              ('beec0000-0000-4000-8000-000000000009', 'Academic Bowl & Quiz', 'academic-bowl'),
              ('beec0000-0000-4000-8000-00000000000a', 'History, Geography & Civics', 'history-geography-civics'),
              ('beec0000-0000-4000-8000-00000000000b', 'Other', 'other');

  - changeSet:
      id: 0005-seed-category-templates
      author: beecompete
      comment: >-
        One permissive JSON Schema per category — the standard attributes-bag keys everywhere,
        plus light category-specific fields. Tightened via admin edits as S4 curation learns.
