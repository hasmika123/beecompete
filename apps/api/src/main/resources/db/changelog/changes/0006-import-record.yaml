# R1-3 — the import-review queue (approved design 2026-07-12). The S3 extraction pipeline
# POSTs extracted records here; curators approve (creating the real Competition/Edition rows
# with provenance.source=import + the pipeline's confidence) or reject. Unreviewed imports
# therefore never touch the public catalog tables.
databaseChangeLog:
  - changeSet:
      id: 0006-import-record
      author: beecompete
      comment: Curation queue for pipeline-extracted records (R1-3 / S3 / DQ13).
      changes:
        - createTable:
            tableName: import_record
            columns:
              - column: { name: id, type: UUID, defaultValueComputed: gen_random_uuid(), constraints: { primaryKey: true, primaryKeyName: pk_import_record } }
              - column: { name: payload, type: JSONB, constraints: { nullable: false } }
              - column: { name: source_url, type: "VARCHAR(1000)" }
              - column: { name: confidence, type: "NUMERIC(3,2)" }
              - column: { name: status, type: "VARCHAR(20)", defaultValue: PENDING, constraints: { nullable: false } }
              - column: { name: note, type: TEXT }
              # reviewed_by → User (R2-1). Nullable, no FK yet.
              - column: { name: reviewed_by, type: UUID }
              - column: { name: reviewed_at, type: "TIMESTAMP WITH TIME ZONE" }
              - column: { name: created_at, type: "TIMESTAMP WITH TIME ZONE", defaultValueComputed: now(), constraints: { nullable: false } }
        - createIndex:
            indexName: ix_import_record_status
            tableName: import_record
            columns: [ { column: { name: status } }, { column: { name: created_at } } ]
