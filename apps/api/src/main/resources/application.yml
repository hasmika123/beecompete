spring:
  application:
    name: beecompete-api
  # Java 21 virtual threads for I/O scalability (architecture §3).
  threads:
    virtual:
      enabled: true

  # Datasource — the app uses Neon's POOLED endpoint (DATABASE_URL). Locally this points
  # at the docker-compose Postgres (infra/docker-compose.yml). Must be a JDBC URL
  # (jdbc:postgresql://…); Neon requires sslmode=require. See docs/setup-runbook.md §5.
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/beecompete}
    username: ${DATABASE_USERNAME:beecompete}
    password: ${DATABASE_PASSWORD:beecompete}
    # HikariCP tuned for a serverless/autosuspending Postgres (Neon). Keep the pool
    # modest and lifetimes under Neon's idle window; tolerate cold-start wake latency.
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      max-lifetime: 240000 # 4 min — under Neon's ~5 min idle window
      idle-timeout: 120000 # 2 min
      connection-timeout: 20000 # generous enough to absorb a cold start
      validation-timeout: 5000

  jpa:
    # Liquibase owns the schema — Hibernate never writes DDL (architecture §3), but it
    # VALIDATES the entity mappings against the migrated schema at startup, so any
    # entity↔migration drift fails the boot loudly instead of surfacing as a runtime error.
    hibernate:
      ddl-auto: validate
    # No open-session-in-view: keep transactions explicit at the service boundary.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # Store timestamps in UTC regardless of server/JVM zone.
          time_zone: UTC

  # Liquibase runs migrations against the DIRECT endpoint (never the pooler — advisory
  # locks aren't pooler-safe). Falls back to DATABASE_URL when DIRECT_URL is unset (local
  # dev, single-endpoint setups). In prod, set DIRECT_* so migrations bypass the pooler.
  # NOTE: this must resolve to a real JDBC URL — an empty value makes Liquibase try to
  # build its own driverless datasource and fail ("Driver has not been set"). In tests,
  # Testcontainers @ServiceConnection overrides this with the container's connection.
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    url: ${DIRECT_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/beecompete}}
    user: ${DIRECT_USERNAME:${DATABASE_USERNAME:beecompete}}
    password: ${DIRECT_PASSWORD:${DATABASE_PASSWORD:beecompete}}

server:
  # Tomcat serves on 8080 by default; graceful shutdown drains in-flight requests.
  # (Undertow dropped 2026-07-12: deprecated in Boot 3.5 / removed in Boot 4, and
  # spring.threads.virtual only applies to Tomcat/Jetty request processing anyway.)
  shutdown: graceful

# R1-3 admin surface — shared-secret gate on /api/v1/admin/** (AdminTokenFilter). The web BFF
# injects the header; the browser sits behind Cloudflare Access and never sees the token.
# Blank/unset = ALL admin calls rejected (fail closed). Replaced by real RBAC at R2-7.
admin:
  api-token: ${ADMIN_API_TOKEN:}

# R1-19 cover-image upload (sweep item 19). Covers are PUBLIC display assets served from a
# public-read bucket (cards/detail/OG/ISR need stable cacheable URLs) — SEPARATE from the future
# private user-files bucket. Blank bucket = feature OFF: the presigner bean isn't created and the
# upload endpoint 503s, so the paste-an-image-URL fallback keeps working. Credentials are NOT here —
# the SDK's default chain reads AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY from the environment.
aws:
  region: ${AWS_REGION:}
  s3:
    bucket: ${S3_BUCKET:}
    # Base for the stored public object URL, e.g. https://<bucket>.s3.<region>.amazonaws.com
    # (or a CDN origin). No trailing slash.
    public-base-url: ${S3_PUBLIC_BASE_URL:}

management:
  endpoints:
    web:
      exposure:
        # Only health + info are exposed. Never expose the full actuator surface publicly.
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: BeeCompete API
    description: K-12 academic-competition marketplace API (modular monolith)

# Observability (F8). Sentry stays OFF unless SENTRY_DSN is set (blank in dev/CI).
# PRIVACY (minors + COPPA): send-default-pii MUST stay false — never attach request
# bodies, headers, cookies, or user identity to error events (compliance.md, data
# minimization). Sample traces lightly.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:}
  send-default-pii: false
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  # Only report our own code's exceptions as unhandled; expected 4xx stay out.
  exception-resolver-order: -2147483647
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
