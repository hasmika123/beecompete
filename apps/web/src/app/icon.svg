<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 171 150">
  <style>
    .dark-mark { visibility: hidden }
    @media (prefers-color-scheme: dark) {
      .light-mark { visibility: hidden }
      .dark-mark { visibility: visible }
    }
  </style>
  <image class="light-mark" x="0" y="0" width="171" height="150" preserveAspectRatio="xMidYMid meet" href="data:image/png;base64,"/>
  <image class="dark-mark" x="0" y="0" width="171" height="150" preserveAspectRatio="xMidYMid meet" href="data:image/png;base64,"/>
</svg>
