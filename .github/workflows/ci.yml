name: CI

# Runs on every PR and on pushes to main. No deploy here — that's F6 (deploy-*.yml).
# Kept fast/cheap (private repo = limited Actions minutes): path filters skip the web/api
# jobs when their tree didn't change, plus dependency caching and cancel-in-progress.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which parts of the monorepo changed so we only run the relevant build jobs.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - '.prettierrc.json'
              - '.prettierignore'
              - '**/*.md'
              - '**/*.yml'
              - '**/*.yaml'
              - '.github/workflows/ci.yml'
            api:
              - 'apps/api/**'
              - '.github/workflows/ci.yml'

  # Web + shared packages: format, lint, typecheck, build (Turbo-orchestrated).
  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test # ui Vitest (F7+) — real tests as of F7
      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  # Spring API: full Gradle build incl. the Testcontainers integration test (ubuntu
  # runners ship Docker, so Testcontainers spins up Postgres for real).
  api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build --no-daemon

  # Security scans (repo-wide, always run). Secret scanning is blocking; SAST and
  # dependency scanning are advisory for now (continue-on-error) — they surface findings
  # without blocking merges on unfixable upstream advisories. Promote to blocking once a
  # triage workflow exists. CodeQL / dependency-review need GHAS (not available on a
  # private Free repo), hence Semgrep + Trivy + gitleaks.
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks reads the PR's commit list on pull_request events
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans commit history

      - name: SAST — Semgrep (advisory)
        continue-on-error: true
        run: |
          pipx install semgrep
          semgrep scan --config p/default --config p/typescript --config p/java --error

      - name: Dependency scan — Trivy (advisory)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Secret scan — gitleaks (blocking)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Single consolidated status: fails if any required job failed (skipped is fine).
  # Point branch protection at this check when the repo goes public / on Pro.
  ci-status:
    if: always()
    needs: [changes, web, api, security]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" \
             || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed (or were skipped by path filters)."
